plugins {
    id 'java'          // Needed to compile Java code
    id 'application'   // Enables running and building an app
}

repositories {
    mavenCentral()
}

dependencies {
    implementation("org.json:json:20250107")
}

application {
    // Fully-qualified class name (with package, if any)
    mainClass = 'MainUI'
}

// Optional: make a runnable fat JAR
jar {
    manifest {
        attributes(
            'Main-Class': application.mainClass
        )
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}
